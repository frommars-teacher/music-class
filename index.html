<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>리듬 비밀번호 - 안정성 최우선 버전</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #fdf6e3; color: #5d4037; margin: 0; padding: 20px; -webkit-user-select: none; user-select: none; }
        .container { max-width: 800px; margin: 0 auto; background: rgba(255,255,255,0.9); padding: 20px; border-radius: 20px; border: 2px solid #d7ccc8; }
        .header-img { width: 100%; max-width: 500px; border-radius: 12px; margin-bottom: 15px; }

        /* 리듬 카드 영역 */
        .rhythm-options { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .option-item { 
            display: flex; flex-direction: column; align-items: center; background: #fff; 
            border: 3px solid #a1887f; border-radius: 12px; padding: 10px; width: 90px; cursor: pointer;
            transition: 0.2s;
        }
        /* 선택되었을 때 강조 효과 */
        .option-item.selected { border: 4px solid #ff9800; background: #fff8e1; transform: scale(1.05); }
        .option-item img { width: 70px; pointer-events: none; }
        .option-item span { font-weight: bold; font-size: 0.8rem; pointer-events: none; }

        /* 비밀번호 슬롯 영역 */
        .password-slots { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; }
        .slot { 
            width: 120px; height: 110px; border: 3px dashed #bcaaa4; border-radius: 15px; 
            position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; 
            cursor: pointer;
        }
        .slot.playing { border: 4px solid #4caf50 !important; background: #e8f5e9; transform: scale(1.05); }
        .slot img { width: 80%; pointer-events: none; }
        
        .delete-btn { position: absolute; top: -8px; right: -8px; width: 28px; height: 28px; background: #e53935; color: #fff; border-radius: 50%; border: 2px solid white; font-weight: bold; cursor: pointer; }
        button { padding: 16px 55px; font-size: 1.4rem; font-weight: bold; background-color: #6d4c41; color: #fff; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="container">
    <img src="그림.png" class="header-img">
    <h2 style="margin: 10px 0;">🔒 리듬 비밀번호 만들기</h2>
    <p style="color: #8d6e63; font-weight: bold;">[리듬 카드 선택] 후 [아래 칸]을 눌러주세요!</p>

    <div class="rhythm-options">
        <div class="option-item" onclick="selectRhythm('1', this)"><span>1번</span><img src="1.png"></div>
        <div class="option-item" onclick="selectRhythm('2', this)"><span>2번</span><img src="2.png"></div>
        <div class="option-item" onclick="selectRhythm('3', this)"><span>3번</span><img src="3.png"></div>
        <div class="option-item" onclick="selectRhythm('4', this)"><span>4번</span><img src="4.png"></div>
        <div class="option-item" onclick="selectRhythm('5', this)"><span>5번</span><img src="5.png"></div>
    </div>

    <div class="password-slots">
        <div class="slot" onclick="placeRhythm(0)"></div>
        <div class="slot" onclick="placeRhythm(1)"></div>
        <div class="slot" onclick="placeRhythm(2)"></div>
        <div class="slot" onclick="placeRhythm(3)"></div>
    </div>

    <button onclick="playPassword()">▶ 비밀번호 재생</button>
</div>

<script>
    let currentId = null;
    let selectedPassword = [null, null, null, null];
    const slots = document.querySelectorAll('.slot');

    // 1. 위쪽 리듬 카드를 누를 때
    function selectRhythm(id, element) {
        currentId = id;
        
        // 소리 재생
        new Audio(`${id}.m4a`).play().catch(() => {});

        // 모든 카드의 강조 효과 제거 후 현재 카드만 강조
        document.querySelectorAll('.option-item').forEach(opt => opt.classList.remove('selected'));
        element.classList.add('selected');
    }

    // 2. 아래쪽 슬롯을 누를 때
    function placeRhythm(index) {
        if (!currentId) {
            alert("먼저 위에서 리듬 카드를 선택해 주세요!");
            return;
        }

        selectedPassword[index] = currentId;
        slots[index].innerHTML = `
            <img src="${currentId}.png">
            <button class="delete-btn" onclick="removeRhythm(${index}, event)">X</button>
        `;
    }

    function removeRhythm(index, e) {
        e.stopPropagation(); // 슬롯 클릭 이벤트 방해 금지
        slots[index].innerHTML = '';
        selectedPassword[index] = null;
    }

    // 3. 재생 로직 (이지 모드)
    async function playPassword() {
        for (let i = 0; i < selectedPassword.length; i++) {
            const id = selectedPassword[i];
            if (!id) continue;

            const slot = slots[i];
            slot.classList.add('playing');
            
            await new Promise(res => {
                const audio = new Audio(`${id}.m4a`);
                audio.play();
                audio.onended = () => {
                    slot.classList.remove('playing');
                    setTimeout(res, 200); 
                };
            });
        }
    }
</script>
</body>
</html>
