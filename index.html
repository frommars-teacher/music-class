<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>음악 수업 - 리듬 비밀번호 [TOUCH OK]</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #f4ece1; color: #3e2723; margin: 0; padding: 20px; touch-action: manipulation; }
        .header-img { max-width: 700px; width: 90%; border-radius: 15px; margin-bottom: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: rgba(255, 255, 255, 0.8); padding: 25px; border-radius: 20px; }
        
        /* 리듬 선택 영역 */
        .rhythm-options { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .option-item { 
            display: flex; flex-direction: column; align-items: center; background: white; 
            border: 2px solid #a1887f; border-radius: 10px; padding: 10px; width: 100px; 
            cursor: pointer; position: relative; touch-action: none; /* 브라우저 기본 스크롤 방해 금지 */
            -webkit-touch-callout: none; user-select: none;
        }
        .option-item span { font-weight: bold; margin-bottom: 5px; color: #795548; pointer-events: none; }
        .option-item img { width: 80px; pointer-events: none; -webkit-user-drag: none; }

        /* 드래그 시 따라다니는 임시 이미지 스타일 */
        .dragging-ghost {
            position: fixed; pointer-events: none; z-index: 1000; opacity: 0.8; width: 80px; transform: translate(-50%, -50%);
        }

        /* 비밀번호 슬롯 영역 */
        .password-slots { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .slot { width: 130px; height: 120px; border: 3px dashed #8d6e63; border-radius: 12px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; }
        .slot.playing { border: 4px solid #2e7d32 !important; background: #e8f5e9; box-shadow: 0 0 15px #4caf50; }
        .slot.hover { background: #efebe9; border-style: solid; border-color: #2e7d32; }
        .slot-number { font-weight: bold; color: #2e7d32; font-size: 0.9rem; }
        .slot img { width: 80%; }

        .delete-btn { position: absolute; top: -5px; right: -5px; width: 25px; height: 25px; background: #d32f2f; color: white; border-radius: 50%; border: none; font-weight: bold; z-index: 5; }

        button { padding: 15px 40px; font-size: 1.2rem; font-weight: bold; background-color: #5d4037; color: white; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <img src="그림.png" class="header-img">
    <h2>🔒 리듬 비밀번호를 드래그하세요</h2>
    <div class="rhythm-options">
        <div class="option-item" data-id="1"><span>1번</span><img src="1.png"></div>
        <div class="option-item" data-id="2"><span>2번</span><img src="2.png"></div>
        <div class="option-item" data-id="3"><span>3번</span><img src="3.png"></div>
        <div class="option-item" data-id="4"><span>4번</span><img src="4.png"></div>
        <div class="option-item" data-id="5"><span>5번</span><img src="5.png"></div>
    </div>
    <div class="password-slots">
        <div class="slot" data-index="0"></div>
        <div class="slot" data-index="1"></div>
        <div class="slot" data-index="2"></div>
        <div class="slot" data-index="3"></div>
    </div>
    <button onclick="playPassword()">▶ 비밀번호 듣기</button>
</div>

<script>
    const slots = document.querySelectorAll('.slot');
    const options = document.querySelectorAll('.option-item');
    let selectedPassword = [null, null, null, null];
    let ghostImg = null;
    let currentDragId = null;
    let isMoved = false;

    // --- 강화된 터치/마우스 통합 드래그 로직 ---
    options.forEach(opt => {
        // 터치 시작 또는 마우스 클릭 시작
        const startDrag = (e) => {
            isMoved = false; // 이동 여부 초기화
            currentDragId = opt.dataset.id;
            const touch = e.touches ? e.touches[0] : e;

            // 드래그 중인 이미지를 시각적으로 보여줌
            ghostImg = document.createElement('img');
            ghostImg.src = `${currentDragId}.png`;
            ghostImg.className = 'dragging-ghost';
            document.body.appendChild(ghostImg);
            moveGhost(touch.clientX, touch.clientY);
        };

        const moveGhost = (x, y) => {
            if (ghostImg) {
                ghostImg.style.left = x + 'px';
                ghostImg.style.top = y + 'px';
                isMoved = true; // 조금이라도 움직였다면 드래그로 간주
            }
        };

        const endDrag = (e) => {
            if (!ghostImg) return;
            
            const touch = e.changedTouches ? e.changedTouches[0] : e;
            document.body.removeChild(ghostImg);
            ghostImg = null;

            // 1. 단순 클릭인 경우: 미리듣기 실행
            if (!isMoved) {
                previewAudio(currentDragId);
                return;
            }

            // 2. 드래그인 경우: 어떤 슬롯 위에 있는지 확인
            const targetSlot = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.slot');
            if (targetSlot) {
                const index = targetSlot.dataset.index;
                updateSlot(index, currentDragId);
            }
        };

        // 이벤트 리스너 연결 (터치 & 마우스)
        opt.addEventListener('touchstart', startDrag, {passive: false});
        opt.addEventListener('mousedown', startDrag);
    });

    // 화면 어디서든 움직이거나 손을 뗐을 때 처리
    window.addEventListener('touchmove', (e) => {
        if (ghostImg) {
            e.preventDefault(); // 스크롤 방지
            moveGhost(e.touches[0].clientX, e.touches[0].clientY);
        }
    }, {passive: false});

    window.addEventListener('mousemove', (e) => {
        if (ghostImg) moveGhost(e.clientX, e.clientY);
    });

    window.addEventListener('touchend', (e) => endDrag(e));
    window.addEventListener('mouseup', (e) => endDrag(e));

    // --- 유틸리티 함수들 ---
    function updateSlot(index, id) {
        selectedPassword[index] = id;
        const slot = slots[index];
        slot.innerHTML = `<div class="slot-number">${id}번</div><img src="${id}.png"><button class="delete-btn" onclick="removeRhythm(${index}, event)">X</button>`;
    }

    function removeRhythm(index, e) {
        e.stopPropagation();
        slots[index].innerHTML = '';
        selectedPassword[index] = null;
    }

    function previewAudio(id) {
        new Audio(`${id}.m4a`).play().catch(() => {});
    }

    async function playPassword() {
        for (let i = 0; i < selectedPassword.length; i++) {
            const id = selectedPassword[i];
            if (!id) continue;
            const slot = slots[i];
            slot.classList.add('playing');
            await new Promise(res => {
                const a = new Audio(`${id}.m4a`);
                a.play();
                a.onended = res;
            });
            slot.classList.remove('playing');
        }
    }
</script>
</body>
</html>
