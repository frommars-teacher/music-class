        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #f4ece1; color: #3e2723; margin: 0; padding: 20px; touch-action: none; }

            background: #fafafa; transition: all 0.2s;

        .slot img { width: 85%; pointer-events: none; }
