<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>음악 수업 - 리듬 비밀번호 [EASY]</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #f4ece1; color: #3e2723; margin: 0; padding: 20px; }
        .header-img { max-width: 700px; width: 90%; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { max-width: 900px; margin: 0 auto; background: rgba(255, 255, 255, 0.8); padding: 25px; border-radius: 20px; }
        
        .rhythm-options { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .option-item { 
            display: flex; flex-direction: column; align-items: center; background: white; 
            border: 2px solid #a1887f; border-radius: 10px; padding: 10px; width: 110px; cursor: pointer;
            -webkit-touch-callout: none; user-select: none; /* 태블릿 꾹 누르기 방지 */
        }
        .option-item:active { transform: scale(0.95); background-color: #eee; }
        .option-item span { font-weight: bold; margin-bottom: 5px; color: #795548; pointer-events: none; }
        .option-item img { width: 90px; pointer-events: none; -webkit-user-drag: none; }

        .password-slots { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .slot { width: 140px; height: 130px; border: 3px dashed #8d6e63; border-radius: 12px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; }
        .slot.playing { border: 4px solid #2e7d32 !important; background: #e8f5e9; transform: scale(1.05); box-shadow: 0 0 15px #4caf50; }
        .slot-number { font-weight: bold; color: #2e7d32; margin-bottom: 5px; }
        .slot img { width: 85%; pointer-events: none; }

        .delete-btn { position: absolute; top: 5px; right: 5px; width: 25px; height: 25px; background: #d32f2f; color: white; border-radius: 50%; border: none; cursor: pointer; display: none; font-weight: bold; }
        .slot:hover .delete-btn { display: block; }

        button { padding: 15px 50px; font-size: 1.3rem; font-weight: bold; background-color: #5d4037; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
<div class="container">
    <img src="그림.png" class="header-img">
    <h2>🔒 리듬 비밀번호를 만드세요 (Easy)</h2>
    <div class="rhythm-options">
        <div class="option-item" draggable="true" data-id="1" onclick="previewAudio('1')"><span>1번</span><img src="1.png"></div>
        <div class="option-item" draggable="true" data-id="2" onclick="previewAudio('2')"><span>2번</span><img src="2.png"></div>
        <div class="option-item" draggable="true" data-id="3" onclick="previewAudio('3')"><span>3번</span><img src="3.png"></div>
        <div class="option-item" draggable="true" data-id="4" onclick="previewAudio('4')"><span>4번</span><img src="4.png"></div>
        <div class="option-item" draggable="true" data-id="5" onclick="previewAudio('5')"><span>5번</span><img src="5.png"></div>
    </div>
    <div class="password-slots">
        <div class="slot" data-index="0"></div><div class="slot" data-index="1"></div><div class="slot" data-index="2"></div><div class="slot" data-index="3"></div>
    </div>
    <button onclick="playPassword()">▶ 비밀번호 듣기</button>
</div>
<script>
    const slots = document.querySelectorAll('.slot');
    const options = document.querySelectorAll('.option-item');
    let selectedPassword = [null, null, null, null];

    options.forEach(opt => {
        opt.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', opt.dataset.id); });
    });

    slots.forEach(slot => {
        slot.addEventListener('dragover', (e) => e.preventDefault());
        slot.addEventListener('drop', (e) => {
            const id = e.dataTransfer.getData('text/plain');
            const index = slot.dataset.index;
            selectedPassword[index] = id;
            slot.innerHTML = `<div class="slot-number">${id}번</div><img src="${id}.png"><button class="delete-btn" onclick="removeRhythm(${index}, event)">X</button>`;
        });
    });

    function previewAudio(id) { new Audio(`${id}.m4a`).play(); }
    function removeRhythm(index, e) { e.stopPropagation(); document.querySelector(`.slot[data-index="${index}"]`).innerHTML = ''; selectedPassword[index] = null; }

    async function playPassword() {
        for (let i = 0; i < selectedPassword.length; i++) {
            const id = selectedPassword[i];
            if (!id) continue;
            const slot = document.querySelector(`.slot[data-index="${i}"]`);
            slot.classList.add('playing');
            await new Promise(res => { const a = new Audio(`${id}.m4a`); a.play(); a.onended = res; });
            slot.classList.remove('playing');
        }
    }
</script>
</body>
</html>
